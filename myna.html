<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>M&N Centro de Estética - ERP</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Lucide Icons CDN -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #fafaf9; } /* bg-stone-50 */
        @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
        .animate-fade-in { animation: fadeIn 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #e5e7eb; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #d1d5db; }
        .nav-item.active { background: linear-gradient(to right, #fff1f2, #ffffff); color: #e11d48; border-left: 4px solid #fb7185; box-shadow: 0 1px 2px 0 rgba(0, 0, 0, 0.05); }
        .nav-item.active .lucide { stroke: #f43f5e; }
    </style>
</head>
<body class="text-stone-800 flex h-screen overflow-hidden">

    <!-- Sidebar Navegación -->
    <aside class="w-72 bg-white border-r border-stone-200 flex flex-col hidden md:flex sticky top-0 h-screen shadow-[4px_0_24px_rgba(0,0,0,0.02)] z-20">
        <div class="p-8 border-b border-stone-100">
            <h1 class="text-3xl font-black tracking-tighter text-stone-800 flex items-center">
                M<span class="text-rose-400 mx-1">&</span>N
            </h1>
            <span class="text-xs font-bold text-stone-400 tracking-widest uppercase block mt-2">Centro de Estética</span>
        </div>
        <nav class="flex-grow p-5 space-y-2.5" id="sidebar-nav">
            <!-- Navegación inyectada por JS -->
        </nav>
        <div class="p-6 border-t border-stone-100 bg-stone-50/50">
           <div class="flex items-center space-x-3 text-xs text-amber-600 font-medium bg-amber-50 p-3 rounded-lg border border-amber-100">
              <i data-lucide="alert-triangle" class="w-4 h-4 flex-shrink-0"></i>
              <span>Modo HTML Puro. Cierre de pestaña perderá datos.</span>
           </div>
        </div>
    </aside>

    <!-- Main Content Area -->
    <main id="app-content" class="flex-grow w-full max-w-7xl mx-auto px-6 sm:px-10 py-10 h-screen overflow-y-auto bg-stone-50">
        <!-- Vistas inyectadas por JS -->
    </main>

    <!-- LÓGICA DE LA APLICACIÓN (VANILLA JS) -->
    <script>
        // ==========================================
        // ESTADO GLOBAL DE LA APLICACIÓN (BASE DE DATOS VOLÁTIL)
        // ==========================================
        const State = {
            activeView: 'dashboard',
            clients: [],
            sessions: [],
            inventory: [],
            expenses: [],
            selectedClientId: null,
            searchQuery: ''
        };

        // ==========================================
        // SISTEMA DE RUTEO Y RENDERIZADO
        // ==========================================
        const MENU_ITEMS = [
            { id: 'dashboard', icon: 'layout-dashboard', label: 'Página Principal' },
            { id: 'searchClient', icon: 'users', label: 'Pacientes y Fichas' },
            { id: 'inventory', icon: 'box', label: 'Control de Stock' },
            { id: 'finances', icon: 'wallet', label: 'Flujo de Caja' }
        ];

        function navigateTo(viewId) {
            State.activeView = viewId;
            renderSidebar();
            renderApp();
        }

        function renderSidebar() {
            const nav = document.getElementById('sidebar-nav');
            nav.innerHTML = MENU_ITEMS.map(item => `
                <button onclick="navigateTo('${item.id}')" class="nav-item w-full flex items-center space-x-3.5 px-5 py-3.5 rounded-xl text-sm font-semibold transition-all duration-200 text-stone-500 hover:bg-stone-50 hover:text-stone-800 border-l-4 border-transparent ${State.activeView === item.id ? 'active' : ''}">
                    <i data-lucide="${item.icon}" class="w-5 h-5"></i>
                    <span>${item.label}</span>
                </button>
            `).join('');
            lucide.createIcons();
        }

        function renderApp() {
            const container = document.getElementById('app-content');
            switch (State.activeView) {
                case 'dashboard': container.innerHTML = ViewDashboard(); break;
                case 'newClient': container.innerHTML = ViewNewClient(); break;
                case 'searchClient': container.innerHTML = ViewSearchClient(); break;
                case 'clientDetail': container.innerHTML = ViewClientDetail(); break;
                case 'inventory': container.innerHTML = ViewInventory(); break;
                case 'finances': container.innerHTML = ViewFinances(); break;
                default: container.innerHTML = '<h1>404 Error Ontológico</h1>';
            }
            lucide.createIcons();
        }

        // ==========================================
        // UTILIDADES Y CÁLCULOS
        // ==========================================
        function getClient() {
            return State.clients.find(c => c.id === State.selectedClientId) || null;
        }

        function formatMoney(amount) {
            return parseFloat(amount).toLocaleString('es-AR');
        }

        function getFinancials() {
            const now = new Date();
            const cm = now.getMonth();
            const cy = now.getFullYear();

            const inc = State.sessions.reduce((acc, curr) => {
                const d = new Date(curr.fecha);
                return (d.getMonth() === cm && d.getFullYear() === cy && curr.precio) ? acc + parseFloat(curr.precio) : acc;
            }, 0);

            const exp = State.expenses.reduce((acc, curr) => {
                const d = new Date(curr.fecha);
                return (d.getMonth() === cm && d.getFullYear() === cy && curr.monto) ? acc + parseFloat(curr.monto) : acc;
            }, 0);

            return { inc, exp, bal: inc - exp };
        }

        // ==========================================
        // MANEJADORES DE FORMULARIOS (Mutaciones de Estado)
        // ==========================================
        window.saveClient = function(e, form) {
            e.preventDefault();
            const fd = new FormData(form);
            const client = { id: crypto.randomUUID(), fechaAlta: new Date().toISOString() };
            // Extraer inputs
            for (let [key, value] of fd.entries()) { client[key] = value; }
            // Extraer checkboxes (FormData no incluye checkboxes desmarcados)
            const checkboxes = ['marcapasos', 'protesisMetalicas', 'embarazoLactancia', 'diu', 'hipertension', 'diabetes', 'varicesTrombosis', 'problemasTiroideos'];
            checkboxes.forEach(cb => { client[cb] = form.elements[cb].checked; });

            State.clients.push(client);
            State.selectedClientId = client.id;
            navigateTo('clientDetail');
        };

        window.saveSession = function(e, form) {
            e.preventDefault();
            const fd = new FormData(form);
            const session = { id: crypto.randomUUID(), clientId: State.selectedClientId };
            for (let [key, value] of fd.entries()) { session[key] = value; }
            State.sessions.push(session);
            renderApp(); // Re-render actual view
        };

        window.saveProduct = function(e, form) {
            e.preventDefault();
            const fd = new FormData(form);
            const prod = { id: crypto.randomUUID() };
            for (let [key, value] of fd.entries()) { prod[key] = value; }
            State.inventory.push(prod);
            renderApp();
        };

        window.saveExpense = function(e, form) {
            e.preventDefault();
            const fd = new FormData(form);
            const exp = { id: crypto.randomUUID() };
            for (let [key, value] of fd.entries()) { exp[key] = value; }
            State.expenses.push(exp);
            renderApp();
        };

        window.searchFilter = function(val) {
            State.searchQuery = val.toLowerCase();
            renderApp(); // Forzar re-render de la lista
        };

        window.viewClientHistory = function(id) {
            State.selectedClientId = id;
            navigateTo('clientDetail');
        }

        // ==========================================
        // VISTAS (Generadores de HTML - Template Literals)
        // ==========================================
        
        function ViewDashboard() {
            const fin = getFinancials();
            return `
            <div class="space-y-8 animate-fade-in">
                <div class="flex justify-between items-center mb-4">
                    <div>
                    <h2 class="text-3xl font-light text-stone-800 tracking-tight">Página Principal</h2>
                    <p class="text-stone-500 mt-1 font-medium">Gestión integral del spa. Todo lo que necesitás, en un solo lugar.</p>
                    </div>
                </div>

                <!-- Bloques Principales -->
                <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                    <div class="bg-white border border-rose-100 rounded-2xl p-8 shadow-sm hover:shadow-md transition-shadow relative overflow-hidden group">
                        <div class="absolute -right-6 -top-6 bg-rose-50 rounded-full p-8 transition-transform group-hover:scale-110"><i data-lucide="users" class="text-rose-200 w-16 h-16"></i></div>
                        <h3 class="text-lg font-semibold text-stone-700 mb-2 relative z-10">Pacientes Activas</h3>
                        <div class="text-5xl font-light text-rose-600 mb-6 relative z-10">${State.clients.length}</div>
                        <button onclick="navigateTo('newClient')" class="w-full bg-gradient-to-r from-rose-400 to-rose-500 hover:from-rose-500 hover:to-rose-600 text-white py-3 rounded-xl transition-all font-medium text-sm flex justify-center items-center shadow-sm relative z-10">
                            <i data-lucide="user-plus" class="w-4 h-4 mr-2"></i> Ingresar Nueva Ficha
                        </button>
                    </div>

                    <div class="bg-white border border-stone-100 rounded-2xl p-8 shadow-sm hover:shadow-md transition-shadow relative overflow-hidden group">
                        <div class="absolute -right-6 -top-6 bg-stone-50 rounded-full p-8 transition-transform group-hover:scale-110"><i data-lucide="activity" class="text-stone-200 w-16 h-16"></i></div>
                        <h3 class="text-lg font-semibold text-stone-700 mb-2 relative z-10">Sesiones Realizadas</h3>
                        <div class="text-5xl font-light text-stone-800 mb-6 relative z-10">${State.sessions.length}</div>
                        <button onclick="navigateTo('searchClient')" class="w-full bg-stone-800 hover:bg-stone-900 text-white py-3 rounded-xl transition-all font-medium text-sm flex justify-center items-center shadow-sm relative z-10">
                            <i data-lucide="search" class="w-4 h-4 mr-2"></i> Buscar Evolución
                        </button>
                    </div>

                    <div class="bg-white border border-stone-100 rounded-2xl p-8 shadow-sm hover:shadow-md transition-shadow relative overflow-hidden group">
                        <div class="absolute -right-6 -top-6 bg-stone-50 rounded-full p-8 transition-transform group-hover:scale-110"><i data-lucide="box" class="text-stone-200 w-16 h-16"></i></div>
                        <h3 class="text-lg font-semibold text-stone-700 mb-2 relative z-10">Inventario y Stock</h3>
                        <div class="text-5xl font-light text-stone-800 mb-6 relative z-10">${State.inventory.length}</div>
                        <button onclick="navigateTo('inventory')" class="w-full bg-white border-2 border-stone-200 hover:border-stone-300 text-stone-700 py-2.5 rounded-xl transition-all font-medium text-sm flex justify-center items-center shadow-sm relative z-10">
                            <i data-lucide="package-plus" class="w-4 h-4 mr-2"></i> Gestionar Productos
                        </button>
                    </div>
                </div>

                <!-- Finanzas -->
                <div class="mt-12 pt-8 border-t border-stone-200">
                    <h3 class="text-sm font-bold text-stone-400 uppercase tracking-widest mb-4">Resumen Financiero del Mes</h3>
                    <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                        <div class="bg-white border border-stone-100 p-5 rounded-xl shadow-sm flex items-center justify-between">
                            <div><span class="text-stone-500 text-xs font-semibold uppercase tracking-wider block mb-1">Ingresos brutos</span><span class="text-xl font-bold text-emerald-600">$${formatMoney(fin.inc)}</span></div>
                            <div class="bg-emerald-50 p-3 rounded-full"><i data-lucide="trending-up" class="text-emerald-500 w-5 h-5"></i></div>
                        </div>
                        <div class="bg-white border border-stone-100 p-5 rounded-xl shadow-sm flex items-center justify-between">
                            <div><span class="text-stone-500 text-xs font-semibold uppercase tracking-wider block mb-1">Gastos / Egresos</span><span class="text-xl font-bold text-rose-500">$${formatMoney(fin.exp)}</span></div>
                            <div class="bg-rose-50 p-3 rounded-full"><i data-lucide="trending-down" class="text-rose-400 w-5 h-5"></i></div>
                        </div>
                        <div class="bg-stone-800 p-5 rounded-xl shadow-sm flex items-center justify-between">
                            <div><span class="text-stone-300 text-xs font-semibold uppercase tracking-wider block mb-1">Balance Neto</span><span class="text-2xl font-black ${fin.bal >= 0 ? 'text-white' : 'text-rose-400'}">$${formatMoney(fin.bal)}</span></div>
                            <div class="bg-stone-700 p-3 rounded-full"><i data-lucide="wallet" class="text-stone-300 w-5 h-5"></i></div>
                        </div>
                    </div>
                </div>
            </div>`;
        }

        function ViewNewClient() {
            const checks = [
                { id: 'marcapasos', l: 'Marcapasos' }, { id: 'protesisMetalicas', l: 'Prótesis Metálicas' },
                { id: 'embarazoLactancia', l: 'Embarazo/Lactancia' }, { id: 'diu', l: 'DIU Metálico' },
                { id: 'hipertension', l: 'Hipertensión' }, { id: 'diabetes', l: 'Diabetes' },
                { id: 'varicesTrombosis', l: 'Várices/Trombos' }, { id: 'problemasTiroideos', l: 'Alt. Tiroides' }
            ].map(c => `
                <label class="flex items-center space-x-3 text-sm text-stone-600 cursor-pointer hover:text-stone-900 transition-colors">
                    <input type="checkbox" name="${c.id}" class="rounded-md border-stone-300 text-rose-500 focus:ring-rose-500 w-4 h-4 cursor-pointer">
                    <span class="font-medium">${c.l}</span>
                </label>
            `).join('');

            return `
            <div class="max-w-4xl mx-auto bg-white border border-stone-100 p-8 rounded-3xl shadow-sm animate-fade-in">
                <div class="flex items-center space-x-3 mb-8 border-b border-stone-100 pb-6">
                    <div class="bg-rose-50 p-3 rounded-full"><i data-lucide="sparkles" class="text-rose-400 w-6 h-6"></i></div>
                    <h2 class="text-2xl font-light text-stone-800 tracking-tight">Apertura de Ficha Clínica</h2>
                </div>
                <form onsubmit="saveClient(event, this)" class="space-y-8">
                    <div class="grid grid-cols-1 md:grid-cols-3 gap-5">
                        <div class="space-y-1.5"><label class="text-xs font-bold text-stone-500 uppercase tracking-wide">Nombre</label><input required type="text" name="nombre" class="w-full p-3 bg-stone-50 border border-stone-200 rounded-xl text-stone-700 focus:border-rose-400 focus:bg-white focus:ring-1 focus:ring-rose-400 outline-none transition-all" /></div>
                        <div class="space-y-1.5"><label class="text-xs font-bold text-stone-500 uppercase tracking-wide">Apellido</label><input required type="text" name="apellido" class="w-full p-3 bg-stone-50 border border-stone-200 rounded-xl text-stone-700 focus:border-rose-400 focus:bg-white outline-none transition-all" /></div>
                        <div class="space-y-1.5"><label class="text-xs font-bold text-stone-500 uppercase tracking-wide">DNI</label><input type="text" name="dni" class="w-full p-3 bg-stone-50 border border-stone-200 rounded-xl text-stone-700 focus:border-rose-400 focus:bg-white outline-none transition-all" /></div>
                        <div class="space-y-1.5"><label class="text-xs font-bold text-stone-500 uppercase tracking-wide">Edad</label><input type="number" name="edad" class="w-full p-3 bg-stone-50 border border-stone-200 rounded-xl text-stone-700 focus:border-rose-400 focus:bg-white outline-none transition-all" /></div>
                        <div class="space-y-1.5"><label class="text-xs font-bold text-stone-500 uppercase tracking-wide">F. Nacimiento</label><input type="date" name="fechaNacimiento" class="w-full p-3 bg-stone-50 border border-stone-200 rounded-xl text-stone-700 focus:border-rose-400 focus:bg-white outline-none transition-all" /></div>
                        <div class="space-y-1.5"><label class="text-xs font-bold text-stone-500 uppercase tracking-wide">Teléfono</label><input type="tel" name="telefono" class="w-full p-3 bg-stone-50 border border-stone-200 rounded-xl text-stone-700 focus:border-rose-400 focus:bg-white outline-none transition-all" /></div>
                    </div>

                    <div class="border-t border-stone-100 pt-8 mt-8">
                        <h3 class="text-lg font-semibold text-stone-700 mb-6">Anamnesis y Biometría Base</h3>
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-5">
                            <div class="space-y-1.5 md:col-span-2"><label class="text-xs font-bold text-stone-500 uppercase tracking-wide">Motivo de la consulta</label><input type="text" name="motivoConsulta" class="w-full p-3 bg-stone-50 border border-stone-200 rounded-xl text-stone-700 focus:border-rose-400 focus:bg-white outline-none transition-all" /></div>
                            <div class="space-y-1.5"><label class="text-xs font-bold text-stone-500 uppercase tracking-wide">Antecedentes médicos</label><textarea name="antecedentesMedicos" rows="2" class="w-full p-3 bg-stone-50 border border-stone-200 rounded-xl text-stone-700 focus:border-rose-400 focus:bg-white outline-none transition-all"></textarea></div>
                            <div class="space-y-1.5"><label class="text-xs font-bold text-stone-500 uppercase tracking-wide">Alergias Conocidas</label><textarea name="alergias" rows="2" class="w-full p-3 bg-rose-50 border border-rose-200 rounded-xl text-rose-700 placeholder-rose-300 focus:border-rose-400 focus:bg-white outline-none transition-all"></textarea></div>

                            <div class="md:col-span-2 bg-stone-50 p-6 rounded-2xl border border-stone-200 mt-4">
                                <h4 class="text-sm font-bold text-rose-500 mb-4 uppercase flex items-center tracking-wide"><i data-lucide="alert-triangle" class="w-4 h-4 mr-2"></i> Protocolo de Exclusión Médica</h4>
                                <div class="grid grid-cols-2 md:grid-cols-4 gap-4">${checks}</div>
                            </div>
                        </div>
                    </div>

                    <div class="flex justify-end pt-6 border-t border-stone-100">
                        <button type="submit" class="flex items-center space-x-2 bg-stone-800 hover:bg-stone-900 text-white px-8 py-3.5 rounded-xl shadow-md transition-all font-medium tracking-wide">
                            <i data-lucide="save" class="w-4 h-4"></i><span>Registrar Paciente</span>
                        </button>
                    </div>
                </form>
            </div>`;
        }

        function ViewSearchClient() {
            const filtered = State.clients.filter(c => 
                c.apellido.toLowerCase().includes(State.searchQuery) || 
                c.nombre.toLowerCase().includes(State.searchQuery) || 
                (c.dni && c.dni.includes(State.searchQuery))
            );

            let listHTML = '';
            if (State.clients.length === 0) {
                listHTML = `<div class="p-16 text-center text-stone-400"><i data-lucide="users" class="mx-auto mb-4 text-stone-200 w-12 h-12"></i><p class="font-medium text-lg text-stone-500">Base de datos vacía.</p></div>`;
            } else if (filtered.length === 0) {
                listHTML = `<div class="p-16 text-center text-stone-400">Sin resultados para "${State.searchQuery}"</div>`;
            } else {
                listHTML = `<ul class="divide-y divide-stone-100">` + filtered.map(c => `
                    <li class="hover:bg-stone-50 transition-colors group">
                        <div class="px-6 py-5 flex items-center justify-between">
                            <div class="flex items-center space-x-5">
                                <div class="bg-rose-50 p-3.5 rounded-full text-rose-500 font-bold uppercase tracking-widest text-sm border border-rose-100 shadow-sm">${c.nombre.charAt(0)}${c.apellido.charAt(0)}</div>
                                <div>
                                    <p class="text-lg font-semibold text-stone-800 group-hover:text-rose-600 transition-colors">${c.apellido}, ${c.nombre}</p>
                                    <p class="text-sm text-stone-500 font-medium mt-0.5">DNI: ${c.dni || '-'} • Cel: ${c.telefono || '-'}</p>
                                </div>
                            </div>
                            <button onclick="viewClientHistory('${c.id}')" class="flex items-center space-x-2 text-stone-600 hover:text-stone-900 font-semibold px-5 py-2.5 bg-white border border-stone-200 hover:border-stone-300 hover:shadow-sm rounded-xl transition-all">
                                <span>Ver Historia Clínica</span> <i data-lucide="arrow-right" class="w-4 h-4"></i>
                            </button>
                        </div>
                    </li>`).join('') + `</ul>`;
            }

            return `
            <div class="max-w-4xl mx-auto animate-fade-in">
                <div class="bg-white border border-stone-100 p-6 rounded-2xl shadow-sm mb-6 flex items-center space-x-4">
                    <div class="relative flex-grow">
                        <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none"><i data-lucide="search" class="w-5 h-5 text-stone-400"></i></div>
                        <input type="text" placeholder="Buscar paciente..." onkeyup="searchFilter(this.value)" value="${State.searchQuery}" class="block w-full pl-12 pr-4 py-3.5 border border-stone-200 rounded-xl bg-stone-50 text-stone-800 placeholder-stone-400 focus:bg-white focus:outline-none focus:border-rose-300 focus:ring-2 focus:ring-rose-100 transition-all font-medium" />
                    </div>
                </div>
                <div class="bg-white rounded-2xl shadow-sm border border-stone-100 overflow-hidden">${listHTML}</div>
            </div>`;
        }

        function ViewClientDetail() {
            const client = getClient();
            if (!client) return `<div class="text-center mt-10 text-stone-500">Error: Cliente no encontrado.</div>`;

            const alertsKeys = ['marcapasos', 'protesisMetalicas', 'embarazoLactancia', 'diu', 'hipertension', 'diabetes', 'varicesTrombosis', 'problemasTiroideos'];
            const alertsHTML = alertsKeys.filter(k => client[k] === true || client[k] === 'true').map(k => `
                <span class="inline-flex items-center px-3 py-1.5 rounded-lg text-xs font-bold bg-rose-50 text-rose-600 uppercase border border-rose-200">
                    <i data-lucide="alert-triangle" class="w-3 h-3 mr-1.5"></i> ${k.replace(/([A-Z])/g, ' $1').trim()}
                </span>
            `).join('');

            const cSessions = State.sessions.filter(s => s.clientId === client.id).sort((a,b) => new Date(b.fecha) - new Date(a.fecha));
            const today = new Date().toISOString().split('T')[0];

            let sessionsHTML = '';
            if (cSessions.length === 0) {
                sessionsHTML = `<tr><td colSpan="6" class="px-6 py-16 text-center text-stone-400 italic">No hay sesiones cargadas en esta ficha.</td></tr>`;
            } else {
                sessionsHTML = cSessions.map(s => `
                    <tr class="hover:bg-stone-50 transition-colors border-b border-stone-100 last:border-0">
                        <td class="px-5 py-4 whitespace-nowrap"><div class="font-semibold text-stone-800">${new Date(s.fecha).toLocaleDateString()}</div><div class="text-xs text-rose-500 font-bold mt-1 tracking-wider uppercase">Sesión ${s.nroSesion}</div></td>
                        <td class="px-5 py-4"><div class="font-medium text-stone-800">${s.tratamiento}</div>${s.precio ? `<div class="text-xs text-emerald-600 font-semibold mt-1">Abonó: $${s.precio}</div>` : ''}</td>
                        <td class="px-5 py-4 text-center border-l border-stone-100 font-semibold text-stone-700">${s.peso ? s.peso+'kg' : '-'}</td>
                        <td class="px-3 py-4 text-center font-medium">${s.cAlta || '-'}</td>
                        <td class="px-3 py-4 text-center font-medium">${s.cMedia || '-'}</td>
                        <td class="px-3 py-4 text-center font-medium">${s.cBaja || '-'}</td>
                    </tr>
                `).join('');
            }

            return `
            <div class="max-w-6xl mx-auto space-y-6 animate-fade-in">
                <button onclick="navigateTo('searchClient')" class="flex items-center space-x-2 text-stone-500 hover:text-stone-800 font-medium transition-colors mb-2">
                    <i data-lucide="arrow-left" class="w-4 h-4"></i><span>Volver al buscador</span>
                </button>

                <!-- Cabecera -->
                <div class="bg-white p-8 rounded-3xl shadow-sm border border-stone-100 border-l-8 border-l-rose-400 flex justify-between items-start relative overflow-hidden">
                    <div class="absolute right-0 top-0 opacity-5 pointer-events-none"><i data-lucide="sparkles" class="w-40 h-40 text-rose-900 -mt-10 -mr-10"></i></div>
                    <div class="relative z-10">
                        <h2 class="text-3xl font-bold text-stone-800 tracking-tight">${client.apellido}, ${client.nombre}</h2>
                        <div class="flex space-x-6 mt-3 text-sm text-stone-500 font-medium">
                            <span class="bg-stone-100 px-3 py-1 rounded-md">DNI: ${client.dni || '-'}</span>
                            <span class="bg-stone-100 px-3 py-1 rounded-md">Edad: ${client.edad || '-'}</span>
                        </div>
                        <div class="mt-5 flex flex-wrap gap-2">${alertsHTML}</div>
                    </div>
                </div>

                <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
                    <!-- Nueva Sesion -->
                    <div class="lg:col-span-1 bg-white p-6 rounded-2xl shadow-sm border border-stone-100 h-fit">
                        <h3 class="text-lg font-semibold text-stone-800 mb-5 border-b border-stone-100 pb-3 flex items-center"><i data-lucide="plus" class="w-5 h-5 text-rose-400 mr-2"></i> Cargar Sesión</h3>
                        <form onsubmit="saveSession(event, this)" class="space-y-4">
                            <div class="space-y-3">
                                <div class="space-y-1"><label class="text-xs font-bold text-stone-500 uppercase">Fecha</label><input required type="date" name="fecha" value="${today}" class="w-full p-2.5 bg-stone-50 border border-stone-200 rounded-lg text-stone-800 text-sm outline-none" /></div>
                                <div class="space-y-1"><label class="text-xs font-bold text-stone-500 uppercase">Tratamiento</label><input required type="text" name="tratamiento" class="w-full p-2.5 bg-stone-50 border border-stone-200 rounded-lg text-stone-800 text-sm focus:border-rose-300 outline-none" /></div>
                                <div class="grid grid-cols-2 gap-3">
                                    <div class="space-y-1"><label class="text-xs font-bold text-stone-500 uppercase">Abono ($)</label><input type="number" name="precio" class="w-full p-2.5 bg-stone-50 border border-stone-200 rounded-lg text-emerald-600 font-semibold text-sm focus:border-emerald-300 outline-none" /></div>
                                    <div class="space-y-1"><label class="text-xs font-bold text-stone-500 uppercase">N° Sesión</label><input type="text" name="nroSesion" value="1" class="w-full p-2.5 bg-stone-50 border border-stone-200 rounded-lg text-stone-800 text-sm focus:border-rose-300 outline-none" /></div>
                                </div>
                            </div>

                            <div class="p-4 bg-stone-50 border border-stone-200 rounded-xl space-y-3 mt-5">
                                <h4 class="text-xs font-bold text-stone-600 uppercase tracking-wide border-b border-stone-200 pb-2">Biometría</h4>
                                <div class="grid grid-cols-3 gap-2 mt-3">
                                    <div class="space-y-1 col-span-3"><label class="text-[10px] font-bold text-stone-500 uppercase">Peso (kg)</label><input type="number" step="0.1" name="peso" class="w-full p-2 bg-white border border-stone-200 rounded-md text-sm text-stone-700 outline-none focus:border-rose-300" /></div>
                                    <div class="space-y-1"><label class="text-[10px] font-bold text-stone-500 uppercase">C. Alta</label><input type="text" name="cAlta" class="w-full p-1.5 bg-white border border-stone-200 rounded-md text-sm text-center text-stone-700" /></div>
                                    <div class="space-y-1"><label class="text-[10px] font-bold text-stone-500 uppercase">C. Media</label><input type="text" name="cMedia" class="w-full p-1.5 bg-white border border-stone-200 rounded-md text-sm text-center text-stone-700" /></div>
                                    <div class="space-y-1"><label class="text-[10px] font-bold text-stone-500 uppercase">C. Baja</label><input type="text" name="cBaja" class="w-full p-1.5 bg-white border border-stone-200 rounded-md text-sm text-center text-stone-700" /></div>
                                </div>
                            </div>
                            <button type="submit" class="w-full mt-6 flex justify-center items-center space-x-2 bg-stone-800 hover:bg-stone-900 text-white px-4 py-3 rounded-xl transition-all font-medium shadow-sm">
                                <i data-lucide="save" class="w-4 h-4"></i><span>Guardar Registro</span>
                            </button>
                        </form>
                    </div>

                    <!-- Log Historial -->
                    <div class="lg:col-span-2 bg-white rounded-2xl shadow-sm border border-stone-100 overflow-hidden flex flex-col">
                        <div class="p-5 bg-stone-50 border-b border-stone-100 flex items-center justify-between">
                            <h3 class="text-lg font-semibold text-stone-800">Historial de Tratamientos</h3>
                        </div>
                        <div class="overflow-x-auto flex-grow">
                            <table class="w-full text-sm text-left text-stone-600">
                                <thead class="text-xs text-stone-400 uppercase bg-white border-b border-stone-100">
                                    <tr>
                                        <th class="px-5 py-4 font-bold">Fecha / Sesión</th><th class="px-5 py-4 font-bold">Servicio</th>
                                        <th class="px-5 py-4 text-center font-bold border-l border-stone-100">Peso</th>
                                        <th class="px-3 py-4 text-center font-bold">CA</th><th class="px-3 py-4 text-center font-bold">CM</th><th class="px-3 py-4 text-center font-bold">CB</th>
                                    </tr>
                                </thead>
                                <tbody>${sessionsHTML}</tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>`;
        }

        function ViewInventory() {
            let invHTML = '';
            if (State.inventory.length === 0) {
                invHTML = `<tr><td colSpan="5" class="px-6 py-12 text-center text-stone-400 italic">El inventario está vacío.</td></tr>`;
            } else {
                invHTML = State.inventory.map(item => {
                    const isLow = parseInt(item.cantidad) <= parseInt(item.stockMinimo || 0);
                    const margin = (item.precioVenta && item.precioCosto) ? parseFloat(item.precioVenta) - parseFloat(item.precioCosto) : null;
                    return `
                    <tr class="hover:bg-stone-50 transition-colors border-b border-stone-100 last:border-0">
                        <td class="px-6 py-4 font-medium text-stone-800">${item.nombre}</td>
                        <td class="px-6 py-4 text-center text-xs text-stone-500">${item.categoria || '-'}</td>
                        <td class="px-6 py-4 text-center font-semibold text-lg text-stone-700">${item.cantidad}</td>
                        <td class="px-6 py-4 text-right text-emerald-600 font-medium">${margin ? '$'+margin : '-'}</td>
                        <td class="px-6 py-4 text-center">
                            ${isLow ? '<span class="inline-flex items-center px-2 py-1 rounded-md text-xs font-bold bg-rose-50 text-rose-600 border border-rose-200">Reponer</span>' 
                                    : '<span class="inline-flex items-center px-2 py-1 rounded-md text-xs font-bold bg-emerald-50 text-emerald-600 border border-emerald-200">Óptimo</span>'}
                        </td>
                    </tr>`;
                }).join('');
            }

            return `
            <div class="animate-fade-in space-y-6">
                <div class="flex justify-between items-center mb-6 border-b border-stone-200 pb-4">
                    <h2 class="text-2xl font-light text-stone-800 flex items-center"><i data-lucide="box" class="w-6 h-6 mr-3 text-rose-400"></i> Gestión de Inventario</h2>
                </div>

                <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
                    <div class="lg:col-span-1 bg-white border border-stone-100 p-6 rounded-2xl shadow-sm h-fit">
                        <h3 class="text-md font-semibold text-stone-700 mb-4 flex items-center"><i data-lucide="package-plus" class="w-5 h-5 mr-2 text-rose-400"></i> Nuevo Producto</h3>
                        <form onsubmit="saveProduct(event, this)" class="space-y-4">
                            <div class="space-y-1"><label class="text-xs font-bold text-stone-500 uppercase">Nombre</label><input required type="text" name="nombre" class="w-full p-2.5 bg-stone-50 border border-stone-200 rounded-lg text-stone-700 text-sm outline-none focus:border-rose-400 focus:ring-1 focus:ring-rose-400 transition-all" /></div>
                            <div class="grid grid-cols-2 gap-3">
                                <div class="space-y-1"><label class="text-xs font-bold text-stone-500 uppercase">Categoría</label>
                                    <select name="categoria" class="w-full p-2.5 bg-stone-50 border border-stone-200 rounded-lg text-stone-700 text-sm outline-none"><option value="Cosmetologia">Cosmetología</option><option value="Insumos">Insumos</option><option value="Venta">Venta Público</option></select>
                                </div>
                                <div class="space-y-1"><label class="text-xs font-bold text-stone-500 uppercase">Cantidad</label><input required type="number" name="cantidad" class="w-full p-2.5 bg-stone-50 border border-stone-200 rounded-lg text-sm outline-none" /></div>
                                <div class="space-y-1"><label class="text-xs font-bold text-stone-500 uppercase">Costo ($)</label><input type="number" name="precioCosto" class="w-full p-2.5 bg-stone-50 border border-stone-200 rounded-lg text-sm outline-none" /></div>
                                <div class="space-y-1"><label class="text-xs font-bold text-stone-500 uppercase">Venta ($)</label><input type="number" name="precioVenta" class="w-full p-2.5 bg-stone-50 border border-stone-200 rounded-lg text-sm outline-none" /></div>
                                <div class="space-y-1 col-span-2"><label class="text-xs font-bold text-stone-500 uppercase">Stock Mínimo</label><input type="number" name="stockMinimo" class="w-full p-2.5 bg-stone-50 border border-stone-200 rounded-lg text-sm outline-none" /></div>
                            </div>
                            <button type="submit" class="w-full mt-4 flex justify-center items-center space-x-2 bg-stone-800 hover:bg-stone-900 text-white px-4 py-3 rounded-xl transition-all font-medium"><i data-lucide="save" class="w-4 h-4"></i> <span>Ingresar al Stock</span></button>
                        </form>
                    </div>

                    <div class="lg:col-span-2 bg-white border border-stone-100 rounded-2xl shadow-sm overflow-hidden flex flex-col">
                        <table class="w-full text-sm text-left text-stone-600">
                            <thead class="text-xs text-stone-500 uppercase bg-stone-50 border-b border-stone-200">
                                <tr><th class="px-6 py-4 font-bold">Producto</th><th class="px-6 py-4 text-center font-bold">Categoría</th><th class="px-6 py-4 text-center font-bold">Stock</th><th class="px-6 py-4 text-right font-bold">Ganancia Neta</th><th class="px-6 py-4 text-center font-bold">Estado</th></tr>
                            </thead>
                            <tbody>${invHTML}</tbody>
                        </table>
                    </div>
                </div>
            </div>`;
        }

        function ViewFinances() {
            const today = new Date().toISOString().split('T')[0];
            let expHTML = '';
            if (State.expenses.length === 0) {
                expHTML = `<tr><td colSpan="4" class="px-6 py-12 text-center text-stone-400 italic">No hay egresos registrados.</td></tr>`;
            } else {
                expHTML = State.expenses.sort((a,b) => new Date(b.fecha) - new Date(a.fecha)).map(exp => `
                    <tr class="hover:bg-stone-50 transition-colors border-b border-stone-100 last:border-0">
                        <td class="px-6 py-4 whitespace-nowrap text-stone-500 font-medium">${new Date(exp.fecha).toLocaleDateString()}</td>
                        <td class="px-6 py-4 font-medium text-stone-800">${exp.concepto}</td>
                        <td class="px-6 py-4 text-center"><span class="px-3 py-1 bg-stone-100 rounded-full text-xs text-stone-600 font-medium">${exp.categoria}</span></td>
                        <td class="px-6 py-4 text-right text-rose-500 font-bold">-$${parseFloat(exp.monto).toLocaleString('es-AR')}</td>
                    </tr>
                `).join('');
            }

            return `
            <div class="animate-fade-in space-y-6">
                <div class="flex justify-between items-center mb-6 border-b border-stone-200 pb-4">
                    <h2 class="text-2xl font-light text-stone-800 flex items-center"><i data-lucide="wallet" class="w-6 h-6 mr-3 text-stone-600"></i> Flujo de Caja (Egresos)</h2>
                </div>

                <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
                    <div class="lg:col-span-1 bg-white border border-stone-100 p-6 rounded-2xl shadow-sm h-fit">
                        <h3 class="text-md font-semibold text-stone-700 mb-4 flex items-center"><i data-lucide="receipt" class="w-5 h-5 mr-2 text-stone-500"></i> Registrar Gasto</h3>
                        <form onsubmit="saveExpense(event, this)" class="space-y-4">
                            <div class="space-y-1"><label class="text-xs font-bold text-stone-500 uppercase">Fecha</label><input required type="date" name="fecha" value="${today}" class="w-full p-2.5 bg-stone-50 border border-stone-200 rounded-lg text-sm outline-none" /></div>
                            <div class="space-y-1"><label class="text-xs font-bold text-stone-500 uppercase">Concepto</label><input required type="text" name="concepto" placeholder="Ej. Luz, Insumos" class="w-full p-2.5 bg-stone-50 border border-stone-200 rounded-lg text-sm outline-none" /></div>
                            <div class="space-y-1"><label class="text-xs font-bold text-stone-500 uppercase">Categoría</label>
                                <select name="categoria" class="w-full p-2.5 bg-stone-50 border border-stone-200 rounded-lg text-sm outline-none"><option value="Operativo">Operativo (Luz, Alquiler)</option><option value="Insumos">Insumos</option><option value="Honorarios">Honorarios</option></select>
                            </div>
                            <div class="space-y-1"><label class="text-xs font-bold text-stone-500 uppercase">Monto Bruto ($)</label><input required type="number" name="monto" class="w-full p-2.5 bg-white border border-stone-300 rounded-lg text-rose-500 font-bold text-lg outline-none focus:border-rose-400" /></div>
                            <button type="submit" class="w-full mt-4 flex justify-center items-center space-x-2 bg-stone-800 hover:bg-stone-900 text-white px-4 py-3 rounded-xl transition-all font-medium shadow-sm"><i data-lucide="save" class="w-4 h-4"></i> <span>Asentar Gasto</span></button>
                        </form>
                    </div>

                    <div class="lg:col-span-2 bg-white border border-stone-100 rounded-2xl shadow-sm overflow-hidden flex flex-col">
                        <div class="p-5 bg-stone-50 border-b border-stone-100 flex justify-between items-center"><h4 class="text-sm font-semibold text-stone-700">Libro Diario</h4></div>
                        <table class="w-full text-sm text-left text-stone-600">
                            <thead class="text-xs text-stone-400 uppercase bg-white border-b border-stone-100">
                                <tr><th class="px-6 py-4 font-bold">Fecha</th><th class="px-6 py-4 font-bold">Concepto</th><th class="px-6 py-4 text-center font-bold">Categoría</th><th class="px-6 py-4 text-right font-bold">Monto</th></tr>
                            </thead>
                            <tbody>${expHTML}</tbody>
                        </table>
                    </div>
                </div>
            </div>`;
        }

        // ==========================================
        // INICIALIZACIÓN
        // ==========================================
        window.onload = () => {
            renderSidebar();
            renderApp();
        };
    </script>
</body>
</html>
